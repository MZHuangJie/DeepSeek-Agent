<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>精美页面</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }

    .container {
      text-align: center;
      padding: 60px 80px;
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
      border: 1px solid rgba(255,255,255,0.25);
    }

    h1 {
      font-size: 48px;
      font-weight: 800;
      background: linear-gradient(135deg, #fff 0%, #f0d0ff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 16px;
      letter-spacing: -1px;
      text-shadow: none;
      filter: drop-shadow(0 4px 20px rgba(255,255,255,0.3));
    }

    .subtitle {
      font-size: 18px;
      color: rgba(255,255,255,0.7);
      margin-bottom: 32px;
      font-weight: 300;
    }

    .btn-group {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
    }

    button {
      padding: 16px 48px;
      font-size: 18px;
      font-weight: 600;
      color: white;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      letter-spacing: 1px;
      transition: all 0.3s ease;
    }

    button:hover {
      transform: translateY(-3px) scale(1.05);
    }

    button:active {
      transform: translateY(0) scale(0.98);
    }

    .btn-primary {
      background: linear-gradient(135deg, #ff6b6b 0%, #ff8e53 100%);
      box-shadow: 0 8px 30px rgba(255, 107, 107, 0.4);
    }

    .btn-primary:hover {
      box-shadow: 0 15px 40px rgba(255, 107, 107, 0.6);
    }

    .btn-outline {
      background: transparent;
      border: 2px solid rgba(255,255,255,0.6);
      box-shadow: 0 4px 20px rgba(255,255,255,0.1);
    }

    .btn-outline:hover {
      background: rgba(255,255,255,0.1);
      border-color: white;
      box-shadow: 0 10px 30px rgba(255,255,255,0.2);
    }

    /* 浮动装饰 */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.5;
      pointer-events: none;
      animation: float 6s ease-in-out infinite;
    }

    .orb-1 {
      width: 300px; height: 300px;
      background: #ff6b6b;
      top: -100px; left: -80px;
      animation-delay: 0s;
    }

    .orb-2 {
      width: 250px; height: 250px;
      background: #4ecdc4;
      bottom: -80px; right: -60px;
      animation-delay: -2s;
    }

    .orb-3 {
      width: 200px; height: 200px;
      background: #ffe66d;
      top: 50%; left: 60%;
      animation-delay: -4s;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-30px) scale(1.08); }
    }

    /* 入场动画 */
    .container {
      animation: fadeInUp 0.8s ease-out;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <div class="container">
    <h1>欢迎来到 DeepSeek Agent</h1>
    <p class="subtitle">AI 驱动的下一代编程助手，让开发更高效</p>
    <div class="btn-group">
      <button class="btn-primary" onclick="alert('你好！👋')">🚀 立即开始</button>
      <button class="btn-outline" onclick="alert('了解更多功能')">📖 了解更多</button>
    </div>
  </div>
</body>
</html>
