name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install
        run: npm install
        shell: powershell
        env:
          npm_config_registry: https://registry.npmjs.org
          npm_config_electron_mirror: https://github.com/electron/electron/releases/download/
          npm_config_electron_builder_binaries_mirror: https://github.com/electron-userland/electron-builder-binaries/releases/download/

      - name: Build
        run: npm run build
        shell: powershell

      - name: Dist
        run: npx electron-builder --win
        shell: powershell
        env:
          DEBUG: electron-builder
          npm_config_registry: https://registry.npmjs.org
          npm_config_electron_mirror: https://github.com/electron/electron/releases/download/
          npm_config_electron_builder_binaries_mirror: https://github.com/electron-userland/electron-builder-binaries/releases/download/

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            release/*.exe
            release/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
