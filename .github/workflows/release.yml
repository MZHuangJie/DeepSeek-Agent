name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install
        run: npm install
        shell: powershell

      - name: Verify build config
        run: |
          Write-Host "package.json main:"
          node -e "console.log(require('./package.json').main)"
        shell: powershell

      - name: Build
        run: npm run build
        shell: powershell

      - name: Package (zip only)
        run: npx electron-builder --win zip
        shell: powershell

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            release/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
